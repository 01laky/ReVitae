name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  HUSKY: 0
  CI: true

jobs:
  lint-and-test:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Disable CRLF conversion on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Verify version consistency
        run: ./scripts/verify-version.sh

      - name: Verify vulnerable NuGet packages
        run: ./scripts/verify-vulnerable-packages.sh

      - name: Lint markdown
        if: runner.os != 'Windows'
        run: ./scripts/lint-md.sh

      - name: Verify test count baseline
        if: runner.os == 'Linux'
        run: ./scripts/verify-test-count.sh

      - name: Lint C# and test
        run: ./scripts/lint-cs.sh

  import-matrix:
    name: John Doe import matrix
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ReVitae.sln

      - name: Run import regression matrix
        run: dotnet test tests/ReVitae.Tests/ReVitae.Tests.csproj --configuration Release --filter "Category=ImportMatrix"

      - name: PDF re-import flake guard (TierB stress)
        run: |
          for i in $(seq 1 3); do
            dotnet test tests/ReVitae.Tests/ReVitae.Tests.csproj --configuration Release \
              --filter "FullyQualifiedName~ClassicSidebarVariant02_StressRepeatImport_SucceedsTenTimes" || exit 1
          done
